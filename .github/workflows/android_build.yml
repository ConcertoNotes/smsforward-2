name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test, lint, and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew

      - name: Test, lint, and build Debug APK
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug --no-daemon

      - name: Prepare installable APK
        if: github.event_name != 'pull_request'
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/XinJie-Forwarder-debug.apk

      - name: Upload APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: XinJie-Forwarder-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/XinJie-Forwarder-debug.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
